version: 2

updates:
  # Keep GitHub Actions up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    # Group all Actions bumps into a single PR to reduce noise.
    groups:
      github-actions:
        patterns:
          - "*"
