name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: >
          👋 Hey @${{ github.actor }}, thanks for opening your first issue!

          We appreciate you taking the time to report this. A maintainer will review it soon.
          Please make sure you've included all the relevant details (logs, steps to reproduce, etc.).
        pr-message: >
          🎉 Thanks for your first pull request, @${{ github.actor }}!
          A maintainer will review it shortly.
