name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup works),
# and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job name MUST be `copilot-setup-steps` — Copilot will not pick it up otherwise.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Least-privilege permissions: only what is needed to check out the repo.
    permissions:
      contents: read

    # Keep the setup bounded; maximum allowed is 59 minutes.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            gcc \
            g++ \
            lcov \
            gcovr \
            cppcheck \
            clang \
            clang-tidy \
            clang-tools \
            doxygen

      - name: Configure (debug preset)
        # Pre-warm the CMake configuration so Copilot can build immediately.
        # Uses the gcc-debug preset (no coverage flags) for a fast, general build.
        run: cmake --preset gcc-debug

      - name: Build
        run: cmake --build --preset gcc-debug

      - name: Run tests
        run: ctest --preset gcc-debug
