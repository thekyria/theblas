name: Documentation

on:
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "include/**"
      - "src/**"
      - "Doxyfile"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege defaults; deploy job adds pages + id-token at job level.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doxygen, graphviz, and pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            doxygen graphviz pandoc

      - name: Generate Doxygen HTML
        run: doxygen Doxyfile

      - name: Convert math reference to HTML
        # --mathjax renders $...$ and $$...$$ notation via MathJax CDN.
        # --toc adds a section navigation sidebar.
        run: |
          pandoc docs/math-reference.md \
            --standalone \
            --mathjax=https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js \
            --toc --toc-depth=2 \
            --metadata title="Mathematical Reference — theblas" \
            -o math-reference.html

      - name: Assemble site
        # site/
        #   index.html            ← landing page
        #   api/                  ← Doxygen HTML
        #   math-reference.html   ← pandoc output
        run: |
          mkdir -p site/api
          cp docs/index.html          site/index.html
          cp math-reference.html      site/math-reference.html
          cp -r docs/doxygen/html/.   site/api/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
