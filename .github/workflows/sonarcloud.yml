# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarCloud analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# Free for open source project.

# 1. Login to SonarCloud.io using your GitHub account

# 2. Import your project on SonarCloud
#     * Add your GitHub organization first, then add your repository as a new project.
#     * Please note that many languages are eligible for automatic analysis,
#       which means that the analysis will start automatically without the need to set up GitHub Actions.
#     * This behavior can be changed in Administration > Analysis Method.
#
# 3. Follow the SonarCloud in-product tutorial
#     * a. Copy/paste the Project Key and the Organization Key into the args parameter below
#          (You'll find this information in SonarCloud. Click on "Information" at the bottom left)
#
#     * b. Generate a new token and add it to your Github repository's secrets using the name SONAR_TOKEN
#          (On SonarCloud, click on your avatar on top-right > My account > Security
#           or go directly to https://sonarcloud.io/account/security/)

# Feel free to take a look at our documentation (https://docs.sonarcloud.io/getting-started/github/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/help/sc/9)

name: SonarCloud analysis

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results
  security-events: write # allows uploading SARIF to GitHub Code Scanning

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required for blame information and new code detection
          fetch-depth: 0

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcovr

      - name: Configure (coverage preset)
        run: cmake --preset gcc-debug-coverage

      - name: Build
        run: cmake --build --preset gcc-debug-coverage

      - name: Run tests
        run: ctest --preset gcc-debug-coverage

      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --sonarqube build/gcc-debug-coverage/coverage.xml \
            --exclude 'tests/.*' \
            --exclude '.*/usr/.*' \
            build/gcc-debug-coverage

      - name: Analyze with SonarCloud
        id: sonar-scan
        # SonarSource/sonarqube-scan-action runs the scanner natively on the
        # Ubuntu runner (not inside a Docker container), so the CFamily
        # subprocess binary (a glibc ELF) executes without issues. The action
        # also handles scanner download internally as a trusted setup step,
        # which avoids firewall blocks in sandboxed environments such as the
        # Copilot coding agent.
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # Wait for SonarCloud to finish processing so we can fetch results.
      # continue-on-error: the quality gate may report FAILED; we still
      # want to upload whatever findings exist.
      - name: Wait for SonarCloud quality gate
        if: steps.sonar-scan.outcome == 'success'
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # The scanner does NOT produce SARIF natively.  We fetch unresolved
      # issues through the SonarCloud Web API and convert them ourselves.
      - name: Fetch SonarCloud issues and generate SARIF
        if: always() && steps.sonar-scan.outcome == 'success'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PROJECT_KEY=$(grep '^projectKey=' .scannerwork/report-task.txt | cut -d= -f2)
          DASHBOARD=$(grep '^dashboardUrl=' .scannerwork/report-task.txt | cut -d= -f2-)

          # Build the API query — scope to the PR when running on a pull request
          API_URL="https://sonarcloud.io/api/issues/search?componentKeys=${PROJECT_KEY}&resolved=false&ps=500"
          PR_NUM=$(echo "$DASHBOARD" | grep -oP 'pullRequest=\K[0-9]+' || true)
          if [ -n "$PR_NUM" ]; then
            API_URL="${API_URL}&pullRequest=${PR_NUM}"
          fi

          curl -sf -u "${SONAR_TOKEN}:" "$API_URL" -o /tmp/sonar-issues.json
          echo "Fetched issues for project ${PROJECT_KEY}"

          python3 - <<'PYEOF'
          import json

          with open("/tmp/sonar-issues.json") as f:
              data = json.load(f)

          SEV = {"BLOCKER": "error", "CRITICAL": "error",
                 "MAJOR": "warning", "MINOR": "note", "INFO": "note"}
          rules, results = {}, []

          for issue in data.get("issues", []):
              rid = issue.get("rule", "unknown")
              lvl = SEV.get(issue.get("severity", "MAJOR"), "warning")

              if rid not in rules:
                  rules[rid] = {
                      "id": rid,
                      "shortDescription": {"text": issue.get("message", rid)[:512]},
                      "defaultConfiguration": {"level": lvl},
                  }

              comp = issue.get("component", "")
              path = comp.split(":", 1)[-1] if ":" in comp else comp
              loc = {"physicalLocation": {"artifactLocation": {"uri": path}}}
              tr = issue.get("textRange")
              if tr:
                  loc["physicalLocation"]["region"] = {
                      "startLine": max(tr.get("startLine", 1), 1),
                      "endLine": max(tr.get("endLine", tr.get("startLine", 1)), 1),
                  }

              results.append({
                  "ruleId": rid,
                  "level": lvl,
                  "message": {"text": issue.get("message", "")},
                  "locations": [loc] if path else [],
              })

          sarif = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/"
                         "main/sarif-2.1/schema/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "SonarCloud",
                          "informationUri": "https://sonarcloud.io",
                          "rules": list(rules.values()),
                      }
                  },
                  "results": results,
              }],
          }

          with open("sonar-report.sarif", "w") as f:
              json.dump(sarif, f, indent=2)

          print(f"Generated SARIF with {len(results)} issue(s) from {len(rules)} rule(s)")
          PYEOF

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && steps.sonar-scan.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sonar-report.sarif
          category: sonarcloud
