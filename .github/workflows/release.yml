name: Release

on:
  push:
    branches: ["master"]
    paths:
      - "CMakeLists.txt"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release on Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from CMakeLists.txt
        id: version
        run: |
          VERSION=$(grep -oP 'VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | head -1)
          if [[ -z "${VERSION}" ]]; then
            echo "::error::Could not extract version from CMakeLists.txt"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: release_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.tag }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes and update files
        if: steps.release_check.outputs.exists == 'false'
        run: python3 scripts/extract-changelog.py > /tmp/release-notes.md

      - name: Update CHANGELOG.md and CMakeLists.txt
        if: steps.release_check.outputs.exists == 'false'
        run: python3 scripts/prepare-release.py ${{ steps.version.outputs.version }}

      - name: Commit updated changelog
        if: steps.release_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs(changelog): update for ${{ steps.version.outputs.tag }} [skip ci]"
          git push

      - name: Create GitHub Release
        if: steps.release_check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "theblas ${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md \
            --target master
