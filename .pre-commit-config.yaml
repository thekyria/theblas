  #         bash -c 'for file in "$@"; do
  #           if [[ "$file" =~ \.(cpp|h|hpp)$ ]] && ! grep -q "Copyright\|License" "$file"; then
  #             echo "// SPDX-License-Identifier: \$(grep SPDX LICENSE || echo 'TBD')" | cat - "$file" > "$file.tmp" && mv "$file.tmp" "$file"
